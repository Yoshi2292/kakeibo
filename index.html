<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>家計簿</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2e7d32">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="家計簿">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- ===== Auth ===== -->
  <section id="section-auth" class="section active">
    <div class="splash">
      <div class="splash-icon">📋</div>
      <h1>家計簿</h1>
      <p class="splash-desc">レシートを撮影して<br>自動で家計簿に記録</p>
      <button id="btn-login" class="btn btn-primary btn-large">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google でログイン
      </button>
    </div>
  </section>

  <!-- ===== Camera ===== -->
  <section id="section-camera" class="section">
    <header class="app-header">
      <div>
        <h1>家計簿</h1>
        <span id="app-version" class="app-version"></span>
      </div>
      <button id="btn-logout" class="btn-icon" title="設定・ログアウト">⚙</button>
    </header>
    <div class="camera-container">
      <div id="preview-wrap" class="preview-wrap hidden">
        <img id="preview-img" alt="撮影画像" class="preview-img">
        <button id="btn-retake" class="btn-retake">撮り直し</button>
      </div>
      <div id="camera-placeholder" class="camera-placeholder">
        <div class="placeholder-icon">🧾</div>
        <p>レシートを撮影してください</p>
      </div>
      <div class="mode-toggle-row">
        <span class="mode-label">自動保存モード</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-autosave">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="ocr-settings">
        <div class="ocr-settings-row">
          <label for="sel-model">モデル</label>
          <select id="sel-model" class="sel-small">
            <option value="claude-haiku-4-5-20251001">Haiku</option>
            <option value="claude-sonnet-4-6">Sonnet</option>
          </select>
        </div>
        <div class="ocr-settings-row">
          <label for="sel-maxpx">解像度</label>
          <select id="sel-maxpx" class="sel-small">
            <option value="600">600px</option>
            <option value="800">800px</option>
            <option value="1200">1200px</option>
            <option value="1568">1568px</option>
            <option value="4096">元画像（4K相当）</option>
          </select>
        </div>
      </div>
      <div id="thumb-queue" class="thumb-queue hidden"></div>
      <div class="camera-actions">
        <label for="camera-input" id="label-camera" class="btn btn-primary btn-large">
          📷 カメラで撮影（1枚）
        </label>
        <input type="file" id="camera-input" accept="image/*" capture="environment" class="visually-hidden">
        <label for="gallery-input" id="label-gallery" class="btn btn-outline btn-large">
          🖼 ライブラリから選択（複数可）
        </label>
        <input type="file" id="gallery-input" accept="image/*" multiple class="visually-hidden">
        <button id="btn-manual" class="btn btn-outline btn-large">✏️ 手動で入力</button>
        <button id="btn-ocr" class="btn btn-secondary btn-large hidden">🔍 OCR で読み取る</button>
      </div>
    </div>
    <div id="loading-ocr" class="loading-overlay hidden">
      <div class="spinner"></div>
      <p>レシートを読み取り中...</p>
    </div>
  </section>

  <!-- ===== Form ===== -->
  <section id="section-form" class="section">
    <header class="app-header">
      <button id="btn-back-camera" class="btn-icon" aria-label="戻る">←</button>
      <h1>内容を確認・編集</h1>
      <span id="form-progress" class="form-progress"></span>
    </header>
    <form id="entry-form" class="form-container" novalidate>
      <div class="form-group">
        <label for="field-date">日付</label>
        <input type="date" id="field-date" name="date" required>
      </div>
      <div class="form-group">
        <label for="field-large-cat">大カテゴリ</label>
        <select id="field-large-cat" name="large_category" required>
          <option value="">選択してください</option>
        </select>
      </div>
      <div class="form-group">
        <label for="field-medium-cat">中カテゴリ</label>
        <select id="field-medium-cat" name="medium_category" required>
          <option value="">先に大カテゴリを選択</option>
        </select>
      </div>
      <div class="form-group">
        <label for="field-store">支払先</label>
        <input type="text" id="field-store" name="store" placeholder="例：イオン">
      </div>
      <div class="form-group">
        <label for="field-amount">金額（円）</label>
        <input type="number" id="field-amount" name="amount" placeholder="例：1500"
               inputmode="numeric" min="0" step="1">
      </div>
      <div class="form-group">
        <label for="field-user">使用者</label>
        <select id="field-user" name="user">
          <option value="">選択してください</option>
        </select>
      </div>
      <div class="form-actions">
        <button type="submit" id="btn-save" class="btn btn-primary btn-large">
          💾 Google Sheets に保存
        </button>
      </div>
    </form>
    <div id="loading-save" class="loading-overlay hidden">
      <div class="spinner"></div>
      <p>保存中...</p>
    </div>
  </section>

  <!-- ===== Success ===== -->
  <section id="section-success" class="section">
    <div class="success-container">
      <div class="success-icon">✓</div>
      <h2>保存しました</h2>
      <div id="success-summary" class="success-summary"></div>
      <button id="btn-next" class="btn btn-primary btn-large">続けて入力</button>
    </div>
  </section>

</div>

<div id="toast" role="alert" aria-live="polite"></div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="config.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
