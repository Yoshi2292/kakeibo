name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build deploy folder
        env:
          CLAUDE_PROXY_URL: ${{ secrets.CLAUDE_PROXY_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          SPREADSHEET_ID:   ${{ secrets.SPREADSHEET_ID }}
        run: |
          mkdir _deploy

          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='_deploy' \
            --exclude='cloudflare-worker' \
            --exclude='config.js' \
            --exclude='config.example.js' \
            . _deploy/

          BUILD_T=$(TZ=Asia/Tokyo date '+%m/%d %H:%M')
          {
            echo "const CONFIG = {"
            echo "  CLAUDE_PROXY_URL: '${CLAUDE_PROXY_URL}',"
            echo "  GOOGLE_CLIENT_ID: '${GOOGLE_CLIENT_ID}',"
            echo "  SPREADSHEET_ID:   '${SPREADSHEET_ID}',"
            echo "  SHEET_NAME:       '2025',"
            echo "  CLAUDE_MODEL:     'claude-sonnet-4-6',"
            echo "  BUILD_TIME:       '${BUILD_T}',"
            echo "};"
            echo "const CATEGORIES = {"
            echo "  '支出': ['食費','日用雑貨','外食費','医療費','被服費','電気代','水道代','交際費','スマホ通信費','スマホローン','都民共済','金・銀・プラチナ積立','プロバイダ料金','車関係費','フィットネス費','ペット費','教育費','娯楽費','税金','悠真おこづかい','その他'],"
            echo "  '収入': ['給与','子供手当'],"
            echo "};"
            echo "const USERS = ['パパ','ママ','悠真'];"
            echo "const ASSET_GROUPS = ["
            echo "  {group:'銀行預金',items:['ゆうちょ（父）','ゆうちょ（悠真）','楽天銀行','千葉銀行','財形貯蓄']},"
            echo "  {group:'保険',items:['東京海上日動終身保険','個人年金']},"
            echo "  {group:'株式資産',items:['三菱UFJ証券','楽天証券']},"
            echo "  {group:'貴金属資産',items:['田中貴金属工業']},"
            echo "  {group:'年金残高',items:['確定拠出年金','退職金残高']},"
            echo "];"
            echo "const ASSET_CATEGORIES = ASSET_GROUPS.flatMap(g => g.items);"
            echo "const LIABILITY_CATEGORIES = ['自動車ローン残高'];"
            echo "const CASHFLOW_INCOME  = ['会社給与','会社賞与','その他収入'];"
            echo "const CASHFLOW_EXPENSE = ['自動車ローン支払い','株式投資','アローワンス（父）','その他支出'];"
          } > _deploy/config.js

          touch _deploy/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _deploy
