name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build deploy folder
        env:
          CLAUDE_PROXY_URL: ${{ secrets.CLAUDE_PROXY_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          SPREADSHEET_ID:   ${{ secrets.SPREADSHEET_ID }}
        run: |
          mkdir _deploy

          # アプリファイルをコピー（git管理不要なものは除外）
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_deploy' \
            --exclude='cloudflare-worker' \
            --exclude='config.js' \
            --exclude='config.example.js' \
            . _deploy/

          # config.js をシークレットから直接生成（.gitignore の影響なし）
          cat > _deploy/config.js << JSEOF
const CONFIG = {
  CLAUDE_PROXY_URL: '${CLAUDE_PROXY_URL}',
  GOOGLE_CLIENT_ID: '${GOOGLE_CLIENT_ID}',
  SPREADSHEET_ID:   '${SPREADSHEET_ID}',
  SHEET_NAME:       '2025',
  CLAUDE_MODEL:     'claude-sonnet-4-6',
};
const CATEGORIES = {
  '支出': ['医療費', '食費', '外食費', '車関係費', '日用雑貨', '被服費'],
  '収入': ['給与', 'その他収入'],
};
JSEOF

          # Jekyll 無効化
          touch _deploy/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _deploy
